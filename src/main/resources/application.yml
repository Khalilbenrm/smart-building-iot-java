server:
  port: 8080

spring:
  application:
    name: smart-iot-building

  data:
    mongodb:
      uri: mongodb://mongo:27017/iot
      auto-index-creation: true

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: iot-sensor-group
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.smariot: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
